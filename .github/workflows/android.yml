name: Android APK

on:
  push:
    branches: ["main", "claude/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Build APK
        working-directory: android
        run: gradle assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: tidalshelf-scrobbler
          path: android/app/build/outputs/apk/release/app-release.apk

      # En cada push a main (o tag v*) se publica un Release con el APK, para
      # que cualquiera lo descargue sin cuenta de GitHub: <repo>/releases/latest
      # El tag sale del versionName del build: subir la versión = release nuevo.
      - name: Read version
        id: version
        if: github.ref == 'refs/heads/main'
        working-directory: android
        run: echo "name=v$(grep -oP 'versionName = \"\K[^\"]+' app/build.gradle.kts)" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

    permissions:
      contents: write
